language: python

python: 3.5

sudo: false

services:
    - mongodb
    - elasticsearch
    - redis-server

addons:
  apt:
    sources:
    - mongodb-3.0-precise
    packages:
    - mongodb-org-server

cache:
  directories:
    - $HOME/.cache/pip
    - $HOME/.npm

before_install:
    - nvm install node
    - nvm use node
    - node --version
    - npm install -g npm@latest
    - npm install -g grunt-cli

install:
    - cd server && pip install -r dev-requirements.txt && cd ..
    - cd client && npm install --python=python2.7 && cd ..

script:
    - cd client && npm test && cd ..
    - cd server && flake8 && cd ..
    - cd server && nosetests && cd ..
    - cd server && behave ./features/ --format progress2 --logging-level ERROR && cd ..
    - cd client && grunt build && cd ..
    - cd server && python manage.py users:create -u test -p test -e test@localhost --admin && cd ..
